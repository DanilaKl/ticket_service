spring.application.name=Ticket Service

grpc.server.port=9090

spring.datasource.url=jdbc:postgresql://localhost:5432/tickets
spring.datasource.username=ticket_user
spring.datasource.password=ticket_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

app.confirmation-timeout-minutes=15