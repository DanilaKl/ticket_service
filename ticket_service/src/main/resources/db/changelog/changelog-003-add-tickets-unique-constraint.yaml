databaseChangeLog:
  - changeSet:
      id: 3
      author: "d.klimkin"
      changes:
        - addUniqueConstraint:
          - columnNames: event_id, number
            constraintName: tickets_number_event_id_pk
            tableName: tickets

      rollback:
        - dropUniqueConstraint:
            constraintName: tickets_number_event_id_pk
            tableName: tickets
