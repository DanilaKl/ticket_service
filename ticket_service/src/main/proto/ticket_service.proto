syntax = "proto3";
package hometask.ticketservice;

service TicketService {
    rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
    rpc GetEvents(GetEventsRequest) returns (GetEventsResponse);
    rpc GetTickets(GetTicketsRequest) returns (GetTicketsResponse);
    rpc GetUserTickets(GetUserTicketsRequest) returns (GetTicketsResponse);
    rpc ReserveTicket(TicketActionRequest) returns (TicketActionResponse);
    rpc ConfirmReservation(TicketActionRequest) returns (TicketActionResponse);
    rpc CancelReservation(TicketActionRequest) returns (TicketActionResponse);
}
message CreateEventRequest {
    string name = 1;
    string date_time = 2;
    repeated string ticket_numbers = 3;
}

message CreateEventResponse {
    int64 event_id = 1;
}

message GetEventsRequest {}

message GetEventsResponse {
    repeated Event events = 1;
}

message GetTicketsRequest {
    int64 event_id = 1;
    bool available_only = 2;
}

message GetUserTicketsRequest {
    string user_id = 1;
}

message GetTicketsResponse {
    repeated Ticket tickets = 1;
}

message TicketActionRequest {
    string user_id = 1;
    string ticket_number = 2;
    int64 event_id = 3;
}

message TicketActionResponse {
    string ticket_number = 1;
}

message Event {
    int64 id = 1;
    string name = 2;
    string date_time = 3;
}

message Ticket {
    string number = 1;
    int64 event_id = 2;
    bool is_reserved = 3;
    bool is_confirmed = 4;
}