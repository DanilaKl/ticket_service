<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket Service Client</title>
</head>
<body>
<div th:fragment="request_form">
  <h2>Входные данные:</h2>
  <form th:action="@{${apiVersion} + '/get-user-tickets-request/perform'}" method="post" th:object="${dto}">
    <label th:for="userId">User ID:</label>
    <div class="form-select">
      <select onchange="this.nextElementSibling.value=this.value">
        <option value="">---</option>
        <option th:if="${users} != null and not ${#lists.isEmpty(users)}"
                th:each="user : ${users}"
                th:value="${user}"
                th:text="${user}">
        </option>
      </select>
      <input type="text" th:field="*{userId}">
    </div>
    <button type="button" class="generate-btn" data-type="user">Generate</button>
    <button type="submit">Send</button>
  </form>
</div>
</body>
</html>
