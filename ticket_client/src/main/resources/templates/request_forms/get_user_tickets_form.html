<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket Service Client</title>
</head>
<body>
<div th:fragment="request_form">
  <h2>Входные данные:</h2>
  <form th:action="@{${apiVersion} + '/get-user-tickets-request/perform'}" class="white_border" method="post" th:object="${dto}">
    <label th:for="userId">User ID:</label><input type="text" th:field="*{userId}">
    <button type="submit">Send</button>
  </form>
</div>
</body>
</html>
