<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket Service Client</title>
</head>
<body>
<div th:fragment="request_form">
  <form th:action="@{${apiVersion} + '/ticket-' + ${action} + '-request/perform'}" method="post" th:object="${dto}">
    <label th:for="userId">User ID:</label>
    <div>
      <select onchange="this.nextElementSibling.value=this.value">
        <option value="">---</option>
        <option th:if="${users} != null and not ${#lists.isEmpty(users)}"
                th:each="user : ${users}"
                th:value="${user}"
                th:text="${user}">
        </option>
      </select>
      <input type="text" th:field="*{userId}" required />
    </div>
    <label th:for="eventId">Event ID:</label>
    <input type="number" th:field="*{eventId}" />
    <label th:for="ticketNumber">Ticket Number:</label>
    <input type="text" th:field="*{ticketNumber}" />
    <button type="button" class="generate-btn" data-type="user">Generate Data</button>
    <button type="submit">Send</button>
  </form>
</div>
</body>
</html>
