<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket Service Client</title>
</head>
<body>
<div th:fragment="request_form">
  <form th:action="@{${apiVersion} + '/ticket-' + ${action} + '-request/perform'}" class="white_border" method="post" th:object="${dto}">
    <label th:for="userId">User ID:</label><input type="text" th:field="*{userId}" />
    <label th:for="eventId">Event ID:</label><input type="number" th:field="*{eventId}" />
    <label th:for="ticketNumber">Ticket Number:</label><input type="text" th:field="*{ticketNumber}" />
    <button type="submit">Send</button>
  </form>
</div>
</body>
</html>
