<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket Service Client</title>
</head>
<body>
<div th:fragment="description" class="info-box">
  <p th:text="'Event ID: ' + ${item.eventId}"></p>
  <p th:text="'Ticket Number: ' + ${item.number}"></p>
  <p th:text="'Status: ' + (${item.isReserved} ? (${item.isConfirmed} ? 'Confirmed' : 'Reserved') : 'Available')"></p>
</div>
</body>
</html>
