databaseChangeLog:
  - changeSet:
      id: 2
      author: "d.klimkin"
      changes:
        - addColumn:
            tableName: tickets
            columns:
              - column:
                  name: version
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            columnName: version
            tableName: tickets